<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Threads 台股提及分析</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #172026;
      --muted: #66737f;
      --line: #d9e0e6;
      --accent: #0f766e;
      --accent-2: #7c3aed;
      --warn: #b45309;
      --bad: #b91c1c;
      --good: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }
    main {
      padding: 20px 0 40px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 82px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .metric .value {
      font-size: 26px;
      font-weight: 750;
      line-height: 1;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr 0.8fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    input, select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    section {
      min-width: 0;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .table {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: #fbfcfd;
    }
    tr:last-child td { border-bottom: 0; }
    tr[data-selected="true"] {
      background: #edf7f6;
    }
    button.stock-row {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef2f7;
      color: #354454;
      font-size: 12px;
      white-space: nowrap;
    }
    .badge.buy, .badge.limitUp, .badge.good { background: #dcfce7; color: var(--good); }
    .badge.sell, .badge.limitDown, .badge.bad { background: #fee2e2; color: var(--bad); }
    .badge.watch { background: #e0f2fe; color: #0369a1; }
    .badge.regret { background: #fef3c7; color: var(--warn); }
    .posts {
      display: grid;
      gap: 10px;
    }
    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    article h2 {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.3;
    }
    article p {
      margin: 10px 0 0;
      color: #2a353d;
      line-height: 1.65;
      font-size: 14px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .empty {
      padding: 24px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    @media (max-width: 840px) {
      .summary, .toolbar, .layout {
        grid-template-columns: 1fr;
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 0;
      }
      .meta {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>Threads 台股提及分析</h1>
      <div class="meta" id="meta">載入中</div>
    </div>
  </header>

  <main class="wrap">
    <div class="summary" id="summary"></div>
    <div class="toolbar">
      <input id="search" type="search" placeholder="搜尋股票、代號、貼文文字">
      <select id="action">
        <option value="">全部行為</option>
        <option value="buy">買進/加碼</option>
        <option value="sell">賣出/出場</option>
        <option value="limitUp">漲停</option>
        <option value="limitDown">跌停</option>
        <option value="watch">觀察/佈局</option>
        <option value="regret">可惜/賣飛</option>
      </select>
      <select id="market">
        <option value="">全部市場</option>
        <option value="TWSE">上市</option>
        <option value="TPEx">上櫃</option>
      </select>
    </div>

    <div class="layout">
      <section>
        <div class="section-title"><span>股票列表</span><span id="stock-count"></span></div>
        <div class="table">
          <table>
            <thead>
              <tr>
                <th>股票</th>
                <th>次數</th>
                <th>訊號</th>
              </tr>
            </thead>
            <tbody id="stocks"></tbody>
          </table>
        </div>
      </section>

      <section>
        <div class="section-title"><span>貼文對照</span><span id="post-count"></span></div>
        <div class="posts" id="posts"></div>
      </section>
    </div>
  </main>

  <script>
    const labels = {
      buy: '買進/加碼',
      sell: '賣出/出場',
      limitUp: '漲停',
      limitDown: '跌停',
      watch: '觀察',
      regret: '可惜',
    };
    const state = { data: null, selectedCode: '', query: '', action: '', market: '' };

    init();

    async function init() {
      const data = await loadData();
      state.data = data;
      document.getElementById('search').addEventListener('input', (event) => {
        state.query = event.target.value.trim().toLowerCase();
        render();
      });
      document.getElementById('action').addEventListener('change', (event) => {
        state.action = event.target.value;
        render();
      });
      document.getElementById('market').addEventListener('change', (event) => {
        state.market = event.target.value;
        render();
      });
      render();
    }

    async function loadData() {
      for (const url of ['latest.json', '../data/latest.json', './data/latest.json']) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (response.ok) return await response.json();
        } catch {}
      }
      throw new Error('找不到 latest.json');
    }

    function render() {
      renderMeta();
      renderSummary();
      const stocks = filteredStocks();
      renderStocks(stocks);
      renderPosts(stocks);
    }

    function renderMeta() {
      const source = state.data.source || {};
      document.getElementById('meta').textContent = `${source.title || source.target || ''}｜更新 ${formatDate(state.data.generatedAt)}`;
    }

    function renderSummary() {
      const summary = state.data.summary;
      const metrics = [
        ['貼文', summary.totalPosts],
        ['含股票貼文', summary.postsWithStocks],
        ['股票數', summary.uniqueStocks],
        ['買進/加碼訊號', summary.actionTotals.buy || 0],
      ];
      document.getElementById('summary').innerHTML = metrics.map(([label, value]) => `
        <div class="metric">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(value)}</div>
        </div>
      `).join('');
    }

    function filteredStocks() {
      const query = state.query;
      return state.data.stocks.filter((stock) => {
        if (state.market && stock.market !== state.market) return false;
        if (state.action && !(stock.actions && stock.actions[state.action])) return false;
        if (!query) return true;
        const haystack = [
          stock.code,
          stock.name,
          stock.market,
          ...stock.posts.map((post) => post.snippet),
        ].join(' ').toLowerCase();
        return haystack.includes(query);
      });
    }

    function renderStocks(stocks) {
      document.getElementById('stock-count').textContent = `${stocks.length} 檔`;
      document.getElementById('stocks').innerHTML = stocks.map((stock) => `
        <tr data-selected="${stock.code === state.selectedCode}">
          <td>
            <button class="stock-row" data-code="${escapeHtml(stock.code || stock.name)}">${escapeHtml(stock.name)}</button>
            <div class="meta">${escapeHtml(stock.code || '')} ${escapeHtml(stock.market || '')}</div>
          </td>
          <td>${stock.count}</td>
          <td><div class="badges">${renderBadges(Object.keys(stock.actions || {}))}</div></td>
        </tr>
      `).join('');
      document.querySelectorAll('button.stock-row').forEach((button) => {
        button.addEventListener('click', () => {
          state.selectedCode = state.selectedCode === button.dataset.code ? '' : button.dataset.code;
          render();
        });
      });
    }

    function renderPosts(stocks) {
      const stockKeys = new Set(stocks.map((stock) => stock.code || stock.name));
      const posts = state.data.posts
        .map((post) => ({
          ...post,
          mentions: post.mentions.filter((mention) => stockKeys.has(mention.code || mention.name)),
        }))
        .filter((post) => post.mentions.length)
        .filter((post) => !state.selectedCode || post.mentions.some((mention) => (mention.code || mention.name) === state.selectedCode));

      document.getElementById('post-count').textContent = `${posts.length} 篇`;
      document.getElementById('posts').innerHTML = posts.length ? posts.map((post) => `
        <article>
          <h2>${escapeHtml(post.topic || '貼文')}｜${escapeHtml(post.time || '')} ${post.url ? `<a href="${escapeAttr(post.url)}" target="_blank" rel="noreferrer">原文</a>` : ''}</h2>
          <div class="badges">${post.mentions.map((mention) => `<span class="badge">${escapeHtml(mention.name)} ${escapeHtml(mention.code || '')}</span>`).join('')}</div>
          <div class="badges" style="margin-top:8px">${renderBadges([...new Set(post.mentions.flatMap((mention) => mention.actions || []))])}</div>
          <p>${highlight(escapeHtml(post.text), post.mentions)}</p>
        </article>
      `).join('') : '<div class="empty">沒有符合條件的貼文。</div>';
    }

    function renderBadges(actions) {
      return actions.map((action) => `<span class="badge ${escapeAttr(action)}">${escapeHtml(labels[action] || action)}</span>`).join('');
    }

    function highlight(html, mentions) {
      const names = [...new Set(mentions.flatMap((mention) => [mention.name, ...(mention.aliases || [])]).filter(Boolean))]
        .sort((a, b) => b.length - a.length);
      let result = html;
      for (const name of names) {
        result = result.replaceAll(escapeHtml(name), `<mark>${escapeHtml(name)}</mark>`);
      }
      return result;
    }

    function formatDate(value) {
      if (!value) return '';
      return new Intl.DateTimeFormat('zh-TW', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(value));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }
  </script>
</body>
</html>
