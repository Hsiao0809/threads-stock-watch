<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Threads 台股提及分析</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #111827;
      --panel-2: #162033;
      --panel-3: #1d293b;
      --text: #e5edf6;
      --muted: #94a3b8;
      --line: #263244;
      --accent: #5eead4;
      --accent-2: #c4b5fd;
      --warn: #fbbf24;
      --bad: #f87171;
      --good: #34d399;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(94, 234, 212, 0.08), transparent 28rem),
        radial-gradient(circle at top right, rgba(196, 181, 253, 0.08), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: rgba(17, 24, 39, 0.88);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .nav a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .nav a[aria-current="page"] {
      color: var(--accent);
      border-color: rgba(94, 234, 212, 0.45);
      background: rgba(94, 234, 212, 0.1);
    }
    .view-panel[hidden] {
      display: none;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }
    main {
      padding: 20px 0 40px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 82px;
      box-shadow: var(--shadow);
    }
    .metric .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .metric .value {
      font-size: 26px;
      font-weight: 750;
      line-height: 1;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr 0.8fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }
    .analysis-header {
      align-items: center;
    }
    .analysis-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }
    .analysis-controls select {
      width: auto;
      min-width: 220px;
      height: 34px;
      font-size: 13px;
    }
    input, select, .reset-filters {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
    }
    .reset-filters {
      appearance: none;
      min-width: 112px;
      background: var(--panel-2);
      color: var(--accent);
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }
    .reset-filters:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(94, 234, 212, 0.1);
    }
    .reset-filters:disabled {
      cursor: default;
      opacity: 0.45;
    }
    input::placeholder {
      color: #64748b;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.16);
      outline: none;
    }
    option {
      background: var(--panel);
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .analysis-panel {
      margin-bottom: 16px;
    }
    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .analysis-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      min-width: 0;
    }
    .analysis-card h2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.3;
    }
    .analysis-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .analysis-stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: rgba(22, 32, 51, 0.72);
    }
    .analysis-stat.grade-good {
      border-color: rgba(52, 211, 153, 0.48);
      background: rgba(16, 185, 129, 0.1);
    }
    .analysis-stat.grade-watch {
      border-color: rgba(251, 191, 36, 0.5);
      background: rgba(251, 191, 36, 0.09);
    }
    .analysis-stat.grade-risk {
      border-color: rgba(248, 113, 113, 0.5);
      background: rgba(248, 113, 113, 0.09);
    }
    .analysis-stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .analysis-stat .value {
      font-size: 18px;
      font-weight: 750;
    }
    .analysis-stat.grade-good .value {
      color: var(--good);
    }
    .analysis-stat.grade-watch .value {
      color: var(--warn);
    }
    .analysis-stat.grade-risk .value {
      color: var(--bad);
    }
    .analysis-stat .value.small {
      font-size: 14px;
      line-height: 1.35;
    }
    .score-bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel-3);
      margin: 8px 0 10px;
    }
    .score-bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .analysis-card p {
      margin: 10px 0 0;
      color: #d6dee8;
      line-height: 1.55;
      font-size: 13px;
    }
    section {
      min-width: 0;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .table {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: var(--panel-2);
    }
    tr:last-child td { border-bottom: 0; }
    tr[data-selected="true"] {
      background: rgba(20, 184, 166, 0.16);
    }
    tbody tr:hover {
      background: rgba(148, 163, 184, 0.08);
    }
    .stock-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .stock-link {
      color: var(--accent);
      font-weight: 750;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    button.stock-row {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      padding: 2px 8px;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
    }
    button.stock-row:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--panel-3);
      color: #cbd5e1;
      font-size: 12px;
      white-space: nowrap;
    }
    .badge.buy, .badge.limitUp, .badge.good { background: rgba(16, 185, 129, 0.16); color: var(--good); }
    .badge.sell, .badge.limitDown, .badge.bad { background: rgba(248, 113, 113, 0.16); color: var(--bad); }
    .badge.watch { background: rgba(56, 189, 248, 0.16); color: #7dd3fc; }
    .badge.regret { background: rgba(251, 191, 36, 0.16); color: var(--warn); }
    .badge.positive { background: rgba(16, 185, 129, 0.16); color: var(--good); }
    .badge.negative { background: rgba(248, 113, 113, 0.16); color: var(--bad); }
    .badge.mixed { background: rgba(56, 189, 248, 0.16); color: #7dd3fc; }
    .posts {
      display: grid;
      gap: 10px;
    }
    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    article h2 {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.3;
    }
    article p {
      margin: 10px 0 0;
      color: #d6dee8;
      line-height: 1.65;
      font-size: 14px;
    }
    mark {
      background: rgba(251, 191, 36, 0.22);
      color: #fde68a;
      border-radius: 3px;
      padding: 0 2px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .muted {
      color: var(--muted);
    }
    .empty {
      padding: 24px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .summary .empty {
      grid-column: 1 / -1;
    }
    @media (max-width: 840px) {
      .summary, .toolbar, .layout, .analysis-grid {
        grid-template-columns: 1fr;
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 0;
      }
      .brand {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }
      .meta {
        text-align: left;
      }
      .analysis-header, .analysis-controls {
        align-items: stretch;
        flex-direction: column;
      }
      .analysis-controls select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div class="brand">
        <h1>Threads 台股提及分析</h1>
        <nav class="nav" aria-label="頁面">
          <a href="#post-filter" data-view="posts" aria-current="page">貼文篩選</a>
          <a href="#stock-analysis" data-view="analysis">股票分析</a>
        </nav>
      </div>
      <div class="meta" id="meta">載入中</div>
    </div>
  </header>

  <main class="wrap">
    <div class="summary" id="summary"></div>

    <section id="post-filter" class="view-panel" data-view-panel="posts">
      <div class="toolbar">
        <input id="search" type="search" placeholder="搜尋股票、代號、貼文文字">
        <select id="action">
          <option value="">全部行為</option>
          <option value="buy">買進/加碼</option>
          <option value="sell">賣出/出場</option>
          <option value="limitUp">漲停</option>
          <option value="limitDown">跌停</option>
          <option value="watch">觀察/佈局</option>
          <option value="regret">可惜/賣飛</option>
        </select>
        <select id="market">
          <option value="">全部市場</option>
          <option value="TWSE">上市</option>
          <option value="TPEx">上櫃</option>
        </select>
        <button id="reset-filters" class="reset-filters" type="button">清除篩選</button>
      </div>

      <div class="layout">
        <section>
          <div class="section-title"><span>股票列表</span><span id="stock-count"></span></div>
          <div class="table">
            <table>
              <thead>
                <tr>
                  <th>股票</th>
                  <th>次數</th>
                  <th>訊號</th>
                </tr>
              </thead>
              <tbody id="stocks"></tbody>
            </table>
          </div>
        </section>

        <section>
          <div class="section-title"><span>貼文對照</span><span id="post-count"></span></div>
          <div class="posts" id="posts"></div>
        </section>
      </div>
    </section>

    <section id="stock-analysis" class="analysis-panel view-panel" data-view-panel="analysis" hidden>
      <div class="section-title analysis-header">
        <span>基本面指標分析</span>
        <div class="analysis-controls">
          <select id="analysis-sort" aria-label="股票分析排序">
            <option value="fundamentalDesc">指標分數高到低</option>
            <option value="fundamentalAsc">指標分數低到高</option>
            <option value="mentionDesc">提及熱度高到低</option>
            <option value="mentionAsc">提及熱度低到高</option>
            <option value="priceDesc">收盤價高到低</option>
            <option value="priceAsc">收盤價低到高</option>
            <option value="peRatioDesc">本益比高到低</option>
            <option value="peRatioAsc">本益比低到高</option>
            <option value="pbRatioDesc">股價淨值比高到低</option>
            <option value="pbRatioAsc">股價淨值比低到高</option>
            <option value="dividendYieldDesc">殖利率高到低</option>
            <option value="dividendYieldAsc">殖利率低到高</option>
            <option value="quarterlyEpsDesc">季度 EPS 高到低</option>
            <option value="quarterlyEpsAsc">季度 EPS 低到高</option>
            <option value="estimatedTtmEpsDesc">估算近四季 EPS 高到低</option>
            <option value="estimatedTtmEpsAsc">估算近四季 EPS 低到高</option>
            <option value="revenueYoYDesc">營收 YoY 高到低</option>
            <option value="revenueYoYAsc">營收 YoY 低到高</option>
            <option value="cumulativeRevenueYoYDesc">累計營收 YoY 高到低</option>
            <option value="cumulativeRevenueYoYAsc">累計營收 YoY 低到高</option>
            <option value="grossMarginDesc">毛利率高到低</option>
            <option value="grossMarginAsc">毛利率低到高</option>
            <option value="roeDesc">ROE 高到低</option>
            <option value="roeAsc">ROE 低到高</option>
            <option value="debtRatioDesc">負債比高到低</option>
            <option value="debtRatioAsc">負債比低到高</option>
            <option value="fcfToNetIncomeRatioDesc">FCF / 淨利高到低</option>
            <option value="fcfToNetIncomeRatioAsc">FCF / 淨利低到高</option>
          </select>
          <span id="analysis-count"></span>
        </div>
      </div>
      <div class="analysis-grid" id="analysis-cards"></div>
    </section>
  </main>

  <script>
    const labels = {
      buy: '買進/加碼',
      sell: '賣出/出場',
      limitUp: '漲停',
      limitDown: '跌停',
      watch: '觀察',
      regret: '可惜',
    };
    const state = {
      data: null,
      selectedCode: '',
      query: '',
      action: '',
      market: '',
      view: initialView(),
      analysisSort: 'fundamentalDesc',
    };

    init();

    async function init() {
      try {
        state.data = await loadData();
      } catch (error) {
        renderLoadError(error);
        return;
      }
      document.getElementById('search').addEventListener('input', (event) => {
        state.query = event.target.value.trim().toLowerCase();
        render();
      });
      document.getElementById('action').addEventListener('change', (event) => {
        state.action = event.target.value;
        render();
      });
      document.getElementById('market').addEventListener('change', (event) => {
        state.market = event.target.value;
        render();
      });
      document.getElementById('analysis-sort').addEventListener('change', (event) => {
        state.analysisSort = event.target.value;
        renderStockAnalysis(state.data.stocks);
      });
      document.getElementById('reset-filters').addEventListener('click', resetFilters);
      document.querySelectorAll('[data-view]').forEach((link) => {
        link.addEventListener('click', () => {
          state.view = link.dataset.view === 'analysis' ? 'analysis' : 'posts';
          renderView();
        });
      });
      window.addEventListener('hashchange', () => {
        state.view = initialView();
        renderView();
      });
      render();
    }

    async function loadData() {
      for (const url of ['latest.json', '../data/latest.json', './data/latest.json']) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) continue;
          const data = await response.json();
          if (Array.isArray(data.stocks) && Array.isArray(data.posts)) return data;
        } catch {}
      }
      throw new Error('找不到 latest.json');
    }

    function initialView() {
      return location.hash === '#stock-analysis' ? 'analysis' : 'posts';
    }

    function renderView() {
      document.querySelectorAll('[data-view-panel]').forEach((panel) => {
        panel.hidden = panel.dataset.viewPanel !== state.view;
      });
      document.querySelectorAll('[data-view]').forEach((link) => {
        if (link.dataset.view === state.view) {
          link.setAttribute('aria-current', 'page');
        } else {
          link.removeAttribute('aria-current');
        }
      });
    }

    function renderLoadError(error) {
      document.getElementById('meta').textContent = '資料讀取失敗';
      document.getElementById('summary').innerHTML = `
        <div class="empty">無法載入 latest.json：${escapeHtml(error.message)}。請先執行更新流程，或確認 GitHub Pages 已經產生 latest.json。</div>
      `;
      document.getElementById('analysis-count').textContent = '';
      document.getElementById('analysis-cards').innerHTML = '<div class="empty">尚未取得股票分析資料。</div>';
      document.getElementById('stock-count').textContent = '0 檔';
      document.getElementById('stocks').innerHTML = '<tr><td colspan="3"><div class="empty">尚未取得股票列表資料。</div></td></tr>';
      document.getElementById('post-count').textContent = '0 篇';
      document.getElementById('posts').innerHTML = '<div class="empty">尚未取得貼文資料。</div>';
      document.getElementById('reset-filters').disabled = true;
      renderView();
    }

    function render() {
      renderMeta();
      renderSummary();
      const stocks = filteredStocks();
      renderStockAnalysis(state.data.stocks);
      renderStocks(stocks);
      renderPosts(stocks);
      renderFilterState();
      renderView();
    }

    function renderMeta() {
      const source = state.data.source || {};
      document.getElementById('meta').textContent = `${source.title || source.target || ''}｜更新 ${formatDate(state.data.generatedAt)}`;
    }

    function renderSummary() {
      const summary = state.data.summary;
      const metrics = [
        ['貼文', summary.totalPosts],
        ['含股票貼文', summary.postsWithStocks],
        ['股票數', summary.uniqueStocks],
        ['基本面覆蓋', summary.fundamentalsCoverage || 0],
        ['進階指標', summary.qualityMetricsCoverage || 0],
        ['現金流覆蓋', summary.cashflowCoverage || 0],
      ];
      document.getElementById('summary').innerHTML = metrics.map(([label, value]) => `
        <div class="metric">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(value)}</div>
        </div>
      `).join('');
    }

    function filteredStocks() {
      const query = state.query;
      return state.data.stocks.filter((stock) => {
        if (state.market && stock.market !== state.market) return false;
        if (state.action && !(stock.actions && stock.actions[state.action])) return false;
        if (!query) return true;
        const haystack = [
          stock.code,
          stock.name,
          stock.market,
          ...stock.posts.map((post) => post.snippet),
        ].join(' ').toLowerCase();
        return haystack.includes(query);
      });
    }

    function renderStocks(stocks) {
      document.getElementById('stock-count').textContent = `${stocks.length} 檔`;
      document.getElementById('stocks').innerHTML = stocks.map((stock) => `
        <tr data-selected="${stockKey(stock) === state.selectedCode}">
          <td>
            <div class="stock-main">
              ${renderStockName(stock)}
              <button class="stock-row" type="button" data-code="${escapeAttr(stockKey(stock))}" title="只看這檔股票">篩選</button>
            </div>
            <div class="meta">${escapeHtml(stock.code || '')} ${escapeHtml(stock.market || '')}</div>
          </td>
          <td>${stock.count}</td>
          <td><div class="badges">${renderBadges(Object.keys(stock.actions || {}))}</div></td>
        </tr>
      `).join('');
      document.querySelectorAll('button.stock-row').forEach((button) => {
        button.addEventListener('click', () => {
          state.selectedCode = state.selectedCode === button.dataset.code ? '' : button.dataset.code;
          render();
        });
      });
    }

    function renderPosts(stocks) {
      const stockKeys = new Set(stocks.map(stockKey));
      const posts = state.data.posts
        .map((post) => ({
          ...post,
          mentions: post.mentions.filter((mention) => stockKeys.has(mention.code || mention.name)),
        }))
        .filter((post) => post.mentions.length)
        .filter((post) => !state.selectedCode || post.mentions.some((mention) => (mention.code || mention.name) === state.selectedCode));

      document.getElementById('post-count').textContent = `${posts.length} 篇`;
      document.getElementById('posts').innerHTML = posts.length ? posts.map((post) => `
        <article>
          <h2>${escapeHtml(post.topic || '貼文')}｜${escapeHtml(post.time || '')} ${post.url ? `<a href="${escapeAttr(post.url)}" target="_blank" rel="noreferrer">原文</a>` : ''}</h2>
          <div class="badges">${post.mentions.map((mention) => `<span class="badge">${escapeHtml(mention.name)} ${escapeHtml(mention.code || '')}</span>`).join('')}</div>
          <div class="badges" style="margin-top:8px">${renderBadges([...new Set(post.mentions.flatMap((mention) => mention.actions || []))])}</div>
          <p>${highlight(escapeHtml(post.text), post.mentions)}</p>
        </article>
      `).join('') : '<div class="empty">沒有符合條件的貼文。</div>';
    }

    function renderStockAnalysis(stocks) {
      const ranked = sortAnalysisStocks([...stocks]
        .map((stock) => ({
          ...stock,
          mentionScore: scoreStock(stock),
          tone: toneLabel(stock),
          fundamentalScore: stock.fundamentals?.analysis?.score ?? -1,
        })));
      const maxScore = Math.max(1, ...ranked.map((stock) => Math.max(0, stock.fundamentalScore)));
      document.getElementById('analysis-count').textContent = ranked.length ? `共 ${ranked.length} 檔` : '';
      document.getElementById('analysis-cards').innerHTML = ranked.length ? ranked.map((stock) => `
        <article class="analysis-card">
          <h2>
            ${renderStockName(stock)}
            <span class="badge ${escapeAttr(fundamentalClass(stock.fundamentalScore))}">${escapeHtml(fundamentalLabel(stock.fundamentalScore))}</span>
          </h2>
          <div class="score-bar"><span style="width:${stock.fundamentalScore >= 0 ? Math.max(6, Math.round((stock.fundamentalScore / maxScore) * 100)) : 6}%"></span></div>
          <div class="analysis-meta">
            ${renderMetric('收盤價', stock.fundamentals?.price, 'number', 'price')}
            ${renderMetric('本益比', stock.fundamentals?.peRatio, 'number', 'peRatio')}
            ${renderMetric('股價淨值比', stock.fundamentals?.pbRatio, 'number', 'pbRatio')}
            ${renderMetric('殖利率', stock.fundamentals?.dividendYield, 'percent', 'dividendYield')}
            ${renderMetric('季度 EPS', stock.fundamentals?.quarterlyEps, 'number', 'quarterlyEps')}
            ${renderMetric('估算近四季 EPS', stock.fundamentals?.estimatedTtmEps, 'number', 'estimatedTtmEps')}
            ${renderMetric('營收 YoY', stock.fundamentals?.revenueYoY, 'percent', 'revenueYoY')}
            ${renderMetric('累計營收 YoY', stock.fundamentals?.cumulativeRevenueYoY, 'percent', 'cumulativeRevenueYoY')}
            ${renderMetric('毛利率', stock.fundamentals?.grossMargin, 'percent', 'grossMargin')}
            ${renderMetric('ROE', stock.fundamentals?.roe, 'percent', 'roe')}
            ${renderMetric('負債比', stock.fundamentals?.debtRatio, 'percent', 'debtRatio')}
            ${renderMetric('FCF / 淨利', stock.fundamentals?.fcfToNetIncomeRatio, 'percent', 'fcfToNetIncomeRatio')}
            ${renderMetric('財報期別', formatFiscal(stock.fundamentals), 'text')}
            ${renderMetric('現金流期別', stock.fundamentals?.cashflowPeriod || '-', 'text')}
            ${renderMetric('提及熱度', stock.mentionScore, 'number')}
            ${renderMetric('貼文訊號', primaryAction(stock), 'text')}
          </div>
          <div class="badges">${renderBadges(Object.keys(stock.actions || {}))}</div>
          <p>${escapeHtml(fundamentalNotes(stock))}</p>
          <p class="muted">FCF 口徑：${escapeHtml(formatCashflowMethod(stock.fundamentals))}</p>
          <p class="muted">資料日期：${escapeHtml(formatDataDates(stock.fundamentals))}</p>
        </article>
      `).join('') : '<div class="empty">沒有符合條件的股票分析。</div>';
    }

    function sortAnalysisStocks(stocks) {
      const sorters = {
        fundamentalDesc: { key: 'fundamentalScore', direction: 'desc' },
        fundamentalAsc: { key: 'fundamentalScore', direction: 'asc' },
        mentionDesc: { key: 'mentionScore', direction: 'desc' },
        mentionAsc: { key: 'mentionScore', direction: 'asc' },
        priceDesc: { path: 'fundamentals.price', direction: 'desc' },
        priceAsc: { path: 'fundamentals.price', direction: 'asc' },
        peRatioDesc: { path: 'fundamentals.peRatio', direction: 'desc' },
        peRatioAsc: { path: 'fundamentals.peRatio', direction: 'asc' },
        pbRatioDesc: { path: 'fundamentals.pbRatio', direction: 'desc' },
        pbRatioAsc: { path: 'fundamentals.pbRatio', direction: 'asc' },
        dividendYieldDesc: { path: 'fundamentals.dividendYield', direction: 'desc' },
        dividendYieldAsc: { path: 'fundamentals.dividendYield', direction: 'asc' },
        quarterlyEpsDesc: { path: 'fundamentals.quarterlyEps', direction: 'desc' },
        quarterlyEpsAsc: { path: 'fundamentals.quarterlyEps', direction: 'asc' },
        estimatedTtmEpsDesc: { path: 'fundamentals.estimatedTtmEps', direction: 'desc' },
        estimatedTtmEpsAsc: { path: 'fundamentals.estimatedTtmEps', direction: 'asc' },
        revenueYoYDesc: { path: 'fundamentals.revenueYoY', direction: 'desc' },
        revenueYoYAsc: { path: 'fundamentals.revenueYoY', direction: 'asc' },
        cumulativeRevenueYoYDesc: { path: 'fundamentals.cumulativeRevenueYoY', direction: 'desc' },
        cumulativeRevenueYoYAsc: { path: 'fundamentals.cumulativeRevenueYoY', direction: 'asc' },
        grossMarginDesc: { path: 'fundamentals.grossMargin', direction: 'desc' },
        grossMarginAsc: { path: 'fundamentals.grossMargin', direction: 'asc' },
        roeDesc: { path: 'fundamentals.roe', direction: 'desc' },
        roeAsc: { path: 'fundamentals.roe', direction: 'asc' },
        debtRatioDesc: { path: 'fundamentals.debtRatio', direction: 'desc' },
        debtRatioAsc: { path: 'fundamentals.debtRatio', direction: 'asc' },
        fcfToNetIncomeRatioDesc: { path: 'fundamentals.fcfToNetIncomeRatio', direction: 'desc' },
        fcfToNetIncomeRatioAsc: { path: 'fundamentals.fcfToNetIncomeRatio', direction: 'asc' },
      };
      const sorter = sorters[state.analysisSort] || sorters.fundamentalDesc;
      return stocks.sort((left, right) => compareBySorter(left, right, sorter));
    }

    function renderMetric(label, value, format = 'number', metric = '') {
      const grade = metric ? metricGrade(metric, value) : '';
      const help = metric ? metricHelp(metric) : '';
      const classes = ['analysis-stat', grade ? `grade-${grade}` : ''].filter(Boolean).join(' ');
      const valueClass = format === 'text' ? 'value small' : 'value';
      return `
        <div class="${classes}" ${help ? `title="${escapeAttr(help)}"` : ''}>
          <div class="label">${escapeHtml(label)}</div>
          <div class="${valueClass}">${formatMetricValue(value, format)}</div>
        </div>
      `;
    }

    function formatMetricValue(value, format) {
      if (format === 'text') return escapeHtml(value || '-');
      if (format === 'percent') return formatPercent(value);
      return formatNumber(value);
    }

    function metricGrade(metric, value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return '';
      switch (metric) {
        case 'peRatio':
          if (number <= 0) return 'risk';
          if (number < 12) return 'good';
          if (number <= 25) return '';
          if (number <= 40) return 'watch';
          return 'risk';
        case 'pbRatio':
          if (number <= 0) return '';
          if (number < 1) return 'watch';
          if (number <= 3) return 'good';
          if (number <= 5) return 'watch';
          return 'risk';
        case 'dividendYield':
          if (number >= 8) return 'watch';
          if (number >= 4) return 'good';
          return '';
        case 'quarterlyEps':
        case 'estimatedTtmEps':
          if (number > 0) return 'good';
          if (number < 0) return 'risk';
          return '';
        case 'revenueYoY':
        case 'cumulativeRevenueYoY':
          if (number >= 20) return 'good';
          if (number < 0) return 'risk';
          return '';
        case 'grossMargin':
          if (number >= 30) return 'good';
          if (number < 10) return 'risk';
          return '';
        case 'roe':
          if (number >= 20) return 'good';
          if (number >= 5 && number < 10) return 'watch';
          if (number < 5) return 'risk';
          return '';
        case 'debtRatio':
          if (number <= 40) return 'good';
          if (number <= 60) return '';
          if (number <= 70) return 'watch';
          return 'risk';
        case 'fcfToNetIncomeRatio':
          if (number >= 100) return 'good';
          if (number >= 0 && number < 50) return 'watch';
          if (number < 0) return 'risk';
          return '';
        default:
          return '';
      }
    }

    function metricHelp(metric) {
      const guides = {
        peRatio: '本益比分級：0 以下紅；低於 12 綠；12-25 中性；25-40 黃；40 以上紅。高低仍需同產業比較。',
        pbRatio: '股價淨值比分級：低於 1 黃；1-3 綠；3-5 黃；5 以上紅。P/B 過低也可能反映資產品質或獲利疑慮。',
        dividendYield: '殖利率分級：4%-8% 綠；8% 以上黃，避免把一次性高息或殖利率陷阱視為絕對利多。',
        quarterlyEps: 'EPS 分級：正值綠，負值紅；EPS 絕對值仍需和股本、股價與同業比較。',
        estimatedTtmEps: '估算近四季 EPS 分級：正值綠，負值紅；此值由股價與本益比反推，僅作快速參考。',
        revenueYoY: '營收 YoY 分級：20% 以上綠；0%-20% 中性；負成長紅。',
        cumulativeRevenueYoY: '累計營收 YoY 分級：20% 以上綠；0%-20% 中性；負成長紅。',
        grossMargin: '毛利率分級：30% 以上綠；10%-30% 中性；低於 10% 紅。毛利率產業差異很大。',
        roe: 'ROE 分級：20% 以上綠；10%-20% 中性；5%-10% 黃；低於 5% 紅。',
        debtRatio: '負債比分級：40% 以下綠；40%-60% 中性；60%-70% 黃；70% 以上紅。',
        fcfToNetIncomeRatio: 'FCF/淨利分級：100% 以上綠；50%-100% 中性；0%-50% 黃；負值紅。',
      };
      return guides[metric] || '';
    }

    function compareBySorter(left, right, sorter) {
      const leftValue = metricValue(left, sorter);
      const rightValue = metricValue(right, sorter);
      const leftMissing = leftValue === null;
      const rightMissing = rightValue === null;
      if (leftMissing && rightMissing) return fallbackCompare(left, right);
      if (leftMissing) return 1;
      if (rightMissing) return -1;
      const direction = sorter.direction === 'asc' ? 1 : -1;
      if (leftValue !== rightValue) return (leftValue - rightValue) * direction;
      return fallbackCompare(left, right);
    }

    function metricValue(stock, sorter) {
      const value = sorter.path ? valueAtPath(stock, sorter.path) : stock[sorter.key];
      const number = Number(value);
      if (sorter.key === 'fundamentalScore' && number < 0) return null;
      return Number.isFinite(number) ? number : null;
    }

    function valueAtPath(source, path) {
      return path.split('.').reduce((value, key) => value?.[key], source);
    }

    function fallbackCompare(left, right) {
      return right.fundamentalScore - left.fundamentalScore
        || right.mentionScore - left.mentionScore
        || right.count - left.count
        || stockKey(left).localeCompare(stockKey(right));
    }

    function renderBadges(actions) {
      return actions.map((action) => `<span class="badge ${escapeAttr(action)}">${escapeHtml(labels[action] || action)}</span>`).join('');
    }

    function scoreStock(stock) {
      return Math.max(0,
        stock.count * 3
        + actionCount(stock, 'buy') * 3
        + actionCount(stock, 'limitUp') * 2
        + actionCount(stock, 'watch')
        - actionCount(stock, 'sell')
        - actionCount(stock, 'limitDown') * 2
      );
    }

    function toneLabel(stock) {
      const positive = actionCount(stock, 'buy') + actionCount(stock, 'limitUp') + actionCount(stock, 'watch');
      const negative = actionCount(stock, 'sell') + actionCount(stock, 'limitDown') + actionCount(stock, 'regret');
      if (positive > negative + 1) return '偏多關注';
      if (negative > positive + 1) return '偏空/風險';
      return '多空混合';
    }

    function toneClass(tone) {
      if (tone === '偏多關注') return 'positive';
      if (tone === '偏空/風險') return 'negative';
      return 'mixed';
    }

    function primaryAction(stock) {
      const entries = Object.entries(stock.actions || {}).sort((left, right) => right[1] - left[1]);
      return entries.length ? labels[entries[0][0]] || entries[0][0] : '僅提及';
    }

    function actionCount(stock, action) {
      return Number((stock.actions || {})[action] || 0);
    }

    function fundamentalLabel(score) {
      if (score === undefined || score < 0) return '資料不足';
      if (score >= 65) return '指標較佳';
      if (score >= 45) return '中性觀察';
      return '風險較高';
    }

    function fundamentalClass(score) {
      if (score === undefined || score < 0) return 'mixed';
      if (score >= 65) return 'positive';
      if (score >= 45) return 'mixed';
      return 'negative';
    }

    function fundamentalNotes(stock) {
      const notes = stock.fundamentals?.analysis?.notes || [];
      if (!stock.fundamentals) return '官方基本面資料暫缺，僅能顯示貼文提及脈絡。';
      return notes.length ? notes.join('；') : '官方基本面資料已取得，但尚無明顯指標註記。';
    }

    function formatDataDates(fundamentals) {
      if (!fundamentals) return '無';
      return [
        fundamentals.priceDate ? `行情 ${fundamentals.priceDate}` : '',
        fundamentals.valuationDate ? `估值 ${fundamentals.valuationDate}` : '',
        fundamentals.revenueMonth ? `營收 ${fundamentals.revenueMonth}` : '',
        fundamentals.financialDate ? `財報 ${fundamentals.financialDate}` : '',
        fundamentals.balanceSheetDate ? `資產負債表 ${fundamentals.balanceSheetDate}` : '',
        fundamentals.cashflowPeriod ? `現金流 ${fundamentals.cashflowPeriod}` : '',
      ].filter(Boolean).join('｜') || '無';
    }

    function formatCashflowMethod(fundamentals) {
      if (!fundamentals?.cashflowMethod) return '現金流資料暫缺';
      return fundamentals.cashflowMethod;
    }

    function formatFiscal(fundamentals) {
      if (!fundamentals?.fiscalYear || !fundamentals?.fiscalQuarter) return '-';
      return `${fundamentals.fiscalYear} 年 Q${fundamentals.fiscalQuarter}`;
    }

    function formatNumber(value) {
      if (value === null || value === undefined || value === '') return '-';
      const number = Number(value);
      if (!Number.isFinite(number)) return '-';
      return number.toLocaleString('zh-TW', { maximumFractionDigits: 2 });
    }

    function formatPercent(value) {
      if (value === null || value === undefined || value === '') return '-';
      return `${formatNumber(value)}%`;
    }

    function resetFilters() {
      state.query = '';
      state.action = '';
      state.market = '';
      state.selectedCode = '';
      document.getElementById('search').value = '';
      document.getElementById('action').value = '';
      document.getElementById('market').value = '';
      render();
    }

    function renderFilterState() {
      const isFiltered = Boolean(state.query || state.action || state.market || state.selectedCode);
      document.getElementById('reset-filters').disabled = !isFiltered;
    }

    function renderStockName(stock) {
      const url = tradingViewUrl(stock);
      const label = [stock.name, stock.code].filter(Boolean).join(' ');
      if (!url) return `<span class="stock-link">${escapeHtml(label)}</span>`;
      return `<a class="stock-link" href="${escapeAttr(url)}" target="_blank" rel="noreferrer" title="在 TradingView 開啟 ${escapeAttr(label)}">${escapeHtml(label)}</a>`;
    }

    function tradingViewUrl(stock) {
      if (!stock.code) return '';
      const exchange = stock.market === 'TPEx' ? 'TPEX' : 'TWSE';
      return `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(`${exchange}:${stock.code}`)}`;
    }

    function stockKey(stock) {
      return stock.code || stock.name;
    }

    function highlight(html, mentions) {
      const names = [...new Set(mentions.flatMap((mention) => [mention.name, ...(mention.aliases || [])]).filter(Boolean))]
        .sort((a, b) => b.length - a.length);
      let result = html;
      for (const name of names) {
        result = result.replaceAll(escapeHtml(name), `<mark>${escapeHtml(name)}</mark>`);
      }
      return result;
    }

    function formatDate(value) {
      if (!value) return '';
      return new Intl.DateTimeFormat('zh-TW', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(value));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }
  </script>
</body>
</html>
